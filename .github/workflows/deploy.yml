name: Deploy to Firebase Hosting

# Manual deploy only: a production deploy is always a deliberate act, never a
# side effect of a push. Trigger from the GitHub "Actions" tab → "Run workflow".
#
# Required repository secret (Settings → Secrets and variables → Actions):
#   FIREBASE_SERVICE_ACCOUNT  — the JSON key of a service account with the
#                               "Firebase Hosting Admin" role on the project.
#   VITE_FIREBASE_*           — the web app config values (see .env.example),
#                               added as secrets so the built bundle is wired up.
on:
  workflow_dispatch:

jobs:
  deploy:
    name: Build & deploy hosting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_DEMO_EMAIL: ${{ secrets.VITE_DEMO_EMAIL }}
          VITE_DEMO_PASSWORD: ${{ secrets.VITE_DEMO_PASSWORD }}
        run: npm run build

      - name: Deploy to Firebase Hosting
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-key.json
        run: |
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "$GOOGLE_APPLICATION_CREDENTIALS"
          npx firebase-tools deploy --only hosting --project telemetry-monitor-ecfc7 --non-interactive
          rm -f "$GOOGLE_APPLICATION_CREDENTIALS"
